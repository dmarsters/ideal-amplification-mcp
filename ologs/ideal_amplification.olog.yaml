# ==============================================================================
# EXAMPLES
# ==============================================================================

examples:
  
  heraldic_example:
    persona:
      tincture: "gules"
      visual_weight: 0.6
      detail_density: 0.5
      contrast_level: 0.7
    
    shadow_complement:
      tincture: "argent"  # Antipode flip
      visual_weight: 0.4  # Linear interpolation toward 0
      detail_density: 0.5  # No complement (neutral)
      contrast_level: 0.3  # Opposite intensity
    
    ideal_amplification:
      tincture: "pure_vermillion"  # Same hue, archetypal purity
      visual_weight: 0.8  # Extrapolated toward 1.0
      detail_density: 0.5  # No amplification (neutral)
      contrast_level: 0.85  # Pushed toward maximum clarity
    
    three_way_integration:
      weights: {shadow: 0.2, persona: 0.5, ideal: 0.3}
      
      result:
        tincture: "warm_gules_with_hints_of_white"
        visual_weight: 0.62
        detail_density: 0.5
        contrast_level: 0.68
      
      intentionality: |
        Bold assertive presence (persona/ideal) tempered with
        subtle acknowledgment of receptivity (shadow).
        Forward momentum toward archetypal clarity.
  
  jazz_example:
    persona:
      swing_ratio: 2.0
      harmonic_tension: 0.6
      improvisational_density: 0.7
    
    ideal_amplification:
      swing_ratio: 2.8  # Push toward maximum swing
      harmonic_tension: 0.9  # Intense dissonance before resolution
      improvisational_density: 0.95  # Virtuosic note density
    
    result_comparison:
      persona_feel: "Solid swinging bebop"
      ideal_feel: "Transcendent virtuosic mastery"
      
      intentionality: "Showing what this player could become with years of dedication"
