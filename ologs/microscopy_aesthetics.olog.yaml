    ideal_max: 0.95
    operation: linear_extrapolation
    applicable_to: [brightfield]
    intentionality: "Textbook-quality histology"
  
  # Multiphoton-specific
  penetration_depth:
    type: continuous
    min: 0.0
    max: 1.0
    ideal_max: 0.9
    operation: linear_extrapolation
    applicable_to: [multiphoton]
    intentionality: "Maximum tissue penetration with maintained resolution"
  
  autofluorescence_control:
    type: continuous
    min: 0.0
    max: 1.0
    ideal_max: 0.95
    operation: linear_extrapolation
    applicable_to: [multiphoton]
