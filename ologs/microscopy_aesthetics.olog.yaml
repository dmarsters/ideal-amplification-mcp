# Categorical parameter amplifications
categorical_amplifications:
  
  magnification_scale:
    type: categorical
    operation: intensification
    scale:
      low: 
        ideal: medium
        intentionality: "Move toward cellular-scale detail"
      medium:
        ideal: high
        intentionality: "Move toward subcellular-scale detail"
      high:
        ideal: ultra_high
        intentionality: "Move toward molecular/atomic-scale detail"
  
  color_palette_mode:
    type: categorical
    operation: intensification
    applicable_to: [fluorescence, confocal, multiphoton]
    scale:
      scientific:
        ideal: scientific_enhanced
        intentionality: "Intensify spectral purity and channel separation"
      artistic:
        ideal: artistic_vivid
        intentionality: "Maximize aesthetic impact and color richness"
      monochrome:
        ideal: monochrome_pure
        intentionality: "Perfect grayscale dynamic range"