      autofluorescence_control:
        type: continuous
        range: [0.0, 1.0]
        ideal_max: 0.95
        operation: linear_extrapolation
        applicable_to: ["multiphoton"]
        intentionality: "Specific signal with minimal tissue autofluorescence"
        physical_constraint: "Wavelength selection and spectral unmixing"
      
      phototoxicity_minimization:
        type: continuous
        range: [0.0, 1.0]
        ideal_max: 0.98
        operation: linear_extrapolation
        applicable_to: ["multiphoton"]
        intentionality: "Gentle imaging preserving living tissue"
        physical_constraint: "Laser power and dwell time optimization"
      
      # Categorical parameters
      magnification_scale:
        type: categorical
        operation: intensification
        examples:
          low: "medium"
          medium: "high"
          high: "ultra_high"
        intentionality: "Move toward higher resolution and finer detail"
      
      color_palette_mode:
        type: categorical
        operation: intensification
        applicable_to: ["fluorescence", "confocal", "multiphoton"]
        examples:
          scientific: "scientific_enhanced"
          artistic: "artistic_vivid"
          monochrome: "monochrome_pure"
        intentionality: "Intensify the chosen color approach"
