      # Brightfield-specific
      stain_saturation:
        type: continuous
        range: [0.0, 1.0]
        ideal_max: 0.9
        operation: linear_extrapolation
        applicable_to: ["brightfield"]
        intentionality: "Rich diagnostic staining without artifacts"
        physical_constraint: "Staining protocol optimization"
      
      tissue_clarity:
        type: continuous
        range: [0.0, 1.0]
        ideal_max: 0.95
        operation: linear_extrapolation
        applicable_to: ["brightfield"]
        intentionality: "Perfect tissue preparation and sectioning"
        physical_constraint: "Microtome precision and fixation quality"
      
      histological_definition:
