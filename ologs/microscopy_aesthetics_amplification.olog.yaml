        range: [0.0, 1.0]
        ideal_max: 0.98
        operation: linear_extrapolation
        applicable_to: ["phase_contrast"]
        intentionality: "Perfect phase information with minimal artifacts"
        physical_constraint: "Optical system quality"
      
      ethereal_quality:
        type: continuous
        range: [0.0, 1.0]
        ideal_max: 0.9
        operation: linear_extrapolation
        applicable_to: ["phase_contrast"]
        intentionality: "Ghost-like transparent visualization"
        physical_constraint: "Living specimen preparation"
      
      # Confocal-specific
